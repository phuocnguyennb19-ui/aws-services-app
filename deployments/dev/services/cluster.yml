# ==============================================================================
# ECS CLUSTER & LOAD BALANCER CONFIGURATION
# ==============================================================================
ecs:
  enabled: true
  cluster_name: "dev-core-cluster"
  
  # Monitoring & Capabilities
  container_insights: true
  # Global Scaling & Pricing
  fargate_weight: 1
  fargate_spot_weight: 1
  
alb:
  enabled: true
  name: "dev-main-alb"
  internal: false
  
  # Timing & Performance
  idle_timeout: 60
  enable_deletion_protection: false
  
  # Security (Wired to security module)
  security_group_ingress_rules:
    all_http:
      from_port: 80
      to_port: 80
      ip_protocol: "tcp"
      description: "HTTP from anywhere"
      cidr_ipv4: "0.0.0.0/0"
